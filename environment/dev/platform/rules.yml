# =============================================================================
# rules.yaml
# Security group and NACL rules for the dev environment.
# Consumed by scripts/replace-vars.sh → core/variables/rules.auto.tfvars
# =============================================================================

component:
  - sid: "kr-carevo"
    security_group:
      security_groups_zone:
        - name: "kr-carevo-dev-app-rst-sg"
          id : "kr-app-rst"
          enabled : true
          description: "Restricted Security group for carevo dev environment - No external access, only from within VPC and private subnets"
        - name: "kr-carevo-dev-web-ect-sg"
          id : "kr-web-ect"
          enabled : true
          description: "External Security group for carevo dev environment - Allows HTTP/HTTPS from VPC and app port from private subnets"
        - name: "kr-carevo-dev-app-ict-sg"
          id : "kr-app-ict"
          enabled : true
          description: "Internal Security group for carevo dev environment - Allows controlled internal access and from VPC and private subnets"
      security_group_rule_link:
        - source: "kr-web-ect"
          target: ""          
          rules: 
           in001 :
            cidr_blocks: "0.0.0.0/0"
           in002 :
            cidr_blocks: "0.0.0.0/0"
          description: "Allow HTTP/HTTPS internet to web SG" 
        - source: "kr-web-ect"
          target: "kr-app-ict"
          rules: 
           eg003 : 
            cidr_blocks: ""
          description: "Allow internal app port from web SG to internal SG"
        - source: "kr-app-ict"
          target: "kr-web-ect"
          rules: 
           in003 : 
            cidr_blocks: ""
          description: "Allow internal app port from web SG to internal SG"
        - source: "kr-app-ict"
          target: "kr-app-rst"
          rules:
            eg003:
              cidr_blocks: ""
          description: "Allow app port from internal SG to app SG"
        - source: "kr-app-rst"
          target: "kr-app-ict"
          rules:
            in003 : 
              cidr_blocks: ""
          description: "Allow app port from internal SG to restricted app SG"
        - source: "kr-app-rst"
          target: ""
          rules:
            eg001 :
              cidr_blocks: "0.0.0.0/0" 
          description: "Allow https port from restricted SG to services"
        - source: "kr-app-ict"
          target: ""
          rules:
            eg001 :
              cidr_blocks: "0.0.0.0/0" 
          description: "Allow https port from internal SG to services"
      rules:
        - description: "HTTPS ingress"
          id: "in001"
          protocol: tcp
          from_port: 443
          to_port: 443
          type: "ingress"
        - description: "HTTPS egress"
          id: "eg001"
          protocol: tcp
          from_port: 443
          to_port: 443
          type: "egress"
        - description: "HTTP ingress"
          id: "in002"
          protocol: tcp
          from_port: 80
          to_port: 80
          type: "ingress"
        - description: "HTTP egress"
          id: "eg002"
          protocol: tcp
          from_port: 80
          to_port: 80
          type: "egress"
        - description: "App port ingress"
          id: "in003"
          protocol: tcp
          from_port: 8080
          to_port: 8080
          type: "ingress"
        - description: "App port egress"
          id: "eg003"
          protocol: tcp
          from_port: 8080
          to_port: 8080
          type: "egress"
        - description: "Allow all outbound"
          id: "eg004"
          protocol: "-1"
          from_port: 0
          to_port: 0
          type: "egress"
    nacl:
      nacl_zone:
       - name: "kr-carevo-dev-rst-nacl"
         id: "kr-rst-nacl"
         enabled : true
         description: "NACL for carevo dev environment - Restrictive private rules for app subnets"
         subnets: ["kr-carevo-dev-private-subnet-rst"]
       - name: "kr-carevo-dev-ect-nacl"
         id: "kr-ect-nacl"
         enabled : true
         description: "NACL for carevo dev environment - Moderate public rules for web subnets"
         subnets: ["kr-carevo-dev-public-subnet-ect"]
       - name: "kr-carevo-dev-ict-nacl"
         id: "kr-ict-nacl"
         enabled : true
         description: "NACL for carevo dev environment - Moderate private rules for internal subnets"
         subnets: ["kr-carevo-dev-private-subnet-ict"]
      rules_link:
        - nacl: "kr-ect-nacl"
          rules:
            - in001:
                rule_number: 100
                description: "Allow public HTTPS from 443"
                cidr_block: "0.0.0.0/0"
                subnet: ""
                action: "allow"
            - in002:
                rule_number: 110
                description: "Allow public HTTP from 80"
                cidr_block: "0.0.0.0/0"
                subnet: ""
                action: "allow"
            - in006:
                rule_number: 130
                description: "Default deny all other traffic"
                cidr_block: "0.0.0.0/0"
                subnet: ""
                action: "deny"
            - eg003:
                rule_number: 150
                description: "allow response traffic"
                cidr_block: "0.0.0.0/0"
                subnet: ""
                action: "allow"
            - eg005:
                rule_number: 160
                description: "outbound to app port"
                cidr_block: ""
                subnet: "kr-carevo-dev-private-subnet-ict"
                action: "allow"
        - nacl: "kr-ict-nacl"
          rules:
            - in005:
                rule_number: 100
                description: "Allow app port ingress"
                cidr_block: ""
                subnet: "kr-carevo-dev-public-subnet-ect"
                action: "allow"
            - in001:
                rule_number: 110
                description: "Allow HTTPS from web subnets"
                cidr_block: ""
                subnet: "kr-carevo-dev-public-subnet-ect"
                action: "allow"
            - in006:
                rule_number: 130
                description: "Default deny all other traffic"
                cidr_block: "0.0.0.0/0"
                subnet: ""
                action: "deny"
            - eg003:
                rule_number: 150
                description: "allow response traffic"
                cidr_block: ""
                subnet: "kr-carevo-dev-public-subnet-ect"
                action: "allow"
            - eg005:
                rule_number: 160
                description: "outbound to app port"
                cidr_block: ""
                subnet: "kr-carevo-dev-private-subnet-rst"
                action: "allow"
        - nacl: "kr-rst-nacl"
          rules:
            - in005:
                rule_number: 100
                description: "Allow app port ingress"
                cidr_block: ""
                subnet: "kr-carevo-dev-private-subnet-ict"
                action: "allow"
            - in001:
                rule_number: 110
                description: "Allow HTTPS from controlled subnets"
                cidr_block: ""
                subnet: "kr-carevo-dev-private-subnet-ict"
                action: "allow"
            - in006:
                rule_number: 130
                description: "Default deny all other traffic"
                cidr_block: "0.0.0.0/0"
                subnet: ""
                action: "deny"
            - eg003:
                rule_number: 150
                description: "allow response traffic"
                cidr_block: ""
                subnet: "kr-carevo-dev-private-subnet-ict"
                action: "allow"
                   
      rules:
        - description: "HTTPS ingress"
          id: "in001"
          protocol: tcp
          from_port: 443
          to_port: 443
          type: "ingress"
        - description: "HTTP ingress"
          id: "in002"
          protocol: tcp
          from_port: 80
          to_port: 80
          type: "ingress"
        - description: "Ephemeral port request traffic"
          id: "in003"
          protocol: tcp
          from_port: 1024
          to_port: 65535
          type: "ingress"   
        - description: "App port ingress"
          id: "in005"
          protocol: tcp
          from_port: 8080
          to_port: 8080
          type: "ingress"
        - description: "Default deny all ingress"
          id: "in006"
          protocol: -1
          from_port: 0
          to_port: 0
          type: "ingress"
        - description: "HTTPS egress"
          id: "eg001"
          protocol: tcp
          from_port: 443
          to_port: 443
          type: "egress"
        - description: "HTTP egress"
          id: "eg002"
          protocol: tcp
          from_port: 80
          to_port: 80
          type: "egress"
        - description: "Ephemeral port response traffic"
          id: "eg003"
          protocol: tcp
          from_port: 1024
          to_port: 65535
          type: "egress"
        - description: "App port egress"
          id: "eg005"
          protocol: tcp
          from_port: 8080
          to_port: 8080
          type: "egress"
         

        
        
        
        