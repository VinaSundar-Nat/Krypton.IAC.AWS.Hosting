# =============================================================================
# rules.yaml
# Security group and NACL rules for the dev environment.
# Consumed by scripts/replace-vars.sh → core/variables/security.auto.tfvars
# =============================================================================

security_groups:
  ingress:
    - description: "HTTPS from VPC"
      protocol: tcp
      from_port: 443
      to_port: 443
      cidr_blocks:
        - "10.10.0.0/16"
    - description: "HTTP from VPC"
      protocol: tcp
      from_port: 80
      to_port: 80
      cidr_blocks:
        - "10.10.0.0/16"
    - description: "App port from private subnets"
      protocol: tcp
      from_port: 8080
      to_port: 8080
      cidr_blocks:
        - "10.10.10.0/24"
  egress:
    - description: "Allow all outbound"
      protocol: "-1"
      from_port: 0
      to_port: 0
      cidr_blocks:
        - "0.0.0.0/0"

nacl:
  private:
    inbound:
      - rule_number: 100
        protocol: tcp
        action: allow
        cidr_block: "10.10.0.0/16"
        from_port: 443
        to_port: 443
      - rule_number: 200
        protocol: tcp
        action: allow
        cidr_block: "10.10.0.0/16"
        from_port: 1024
        to_port: 65535
      - rule_number: 900
        protocol: "-1"
        action: deny
        cidr_block: "0.0.0.0/0"
        from_port: 0
        to_port: 0
    outbound:
      - rule_number: 100
        protocol: "-1"
        action: allow
        cidr_block: "0.0.0.0/0"
        from_port: 0
        to_port: 0
  public:
    inbound:
      - rule_number: 100
        protocol: tcp
        action: allow
        cidr_block: "0.0.0.0/0"
        from_port: 443
        to_port: 443
      - rule_number: 110
        protocol: tcp
        action: allow
        cidr_block: "0.0.0.0/0"
        from_port: 80
        to_port: 80
      - rule_number: 200
        protocol: tcp
        action: allow
        cidr_block: "0.0.0.0/0"
        from_port: 1024
        to_port: 65535
    outbound:
      - rule_number: 100
        protocol: "-1"
        action: allow
        cidr_block: "0.0.0.0/0"
        from_port: 0
        to_port: 0
